name: Build

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --if-present

      - name: Make
        run: npm run make

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: out/make/**
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --if-present

      - name: Make
        run: npm run make

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: out/make/**
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2 \
            fakeroot \
            dpkg \
            rpm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --if-present

      - name: Make
        run: npm run make

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: out/make/**
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
      - build-linux
    steps:
      - name: Download build artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**
