<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AzDO Project Management</title>
    <script>
      (function () {
        var resolved = localStorage.getItem("app-theme-resolved");
        if (resolved === "dark") {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer.tsx"></script>
  </body>
</html>
